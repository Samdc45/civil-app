<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Civil App{% endblock %}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }
a { color:#58a6ff; text-decoration:none; } a:hover { text-decoration:underline; }
.nav { background:#161b22; border-bottom:1px solid #30363d; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
.nav-brand { font-weight:700; font-size:1.1rem; color:#e6edf3; display:flex; align-items:center; gap:10px; }
.nav-brand span { background:linear-gradient(135deg,#f97316,#ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-links { display:flex; gap:20px; align-items:center; font-size:0.9rem; }
.btn { display:inline-block; padding:10px 20px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
.btn-primary { background:#f97316; color:#fff; } .btn-primary:hover { background:#ea6c0a; text-decoration:none; }
.btn-secondary { background:#21262d; color:#e6edf3; border:1px solid #30363d; } .btn-secondary:hover { background:#2d333b; text-decoration:none; }
.btn-sm { padding:6px 14px; font-size:0.8rem; }
.container { max-width:1100px; margin:0 auto; padding:32px 24px; }
.card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
.badge-orange { background:rgba(249,115,22,0.15); color:#f97316; }
.badge-green { background:rgba(34,197,94,0.15); color:#22c55e; }
.badge-blue { background:rgba(88,166,255,0.15); color:#58a6ff; }
.progress-bar { background:#21262d; border-radius:99px; height:8px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#f97316,#ef4444); transition:width 0.5s; }
alert { display:block; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:0.9rem; }
.alert-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; }
.alert-success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#86efac; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand" style="text-decoration:none">🏗️ <span>Civil App</span></a>
  <div class="nav-links">
    <a href="/">Courses</a>
    {% if session.student_id %}
      <a href="/dashboard">My Learning</a>
      {% if session.is_admin %}<a href="/admin">Admin</a>{% endif %}
      <a href="/logout" class="btn btn-secondary btn-sm">Logout</a>
    {% else %}
      <a href="/login">Login</a>
      <a href="/register" class="btn btn-primary btn-sm">Get Started</a>
    {% endif %}
  </div>
</nav>
{% block content %}{% endblock %}
<footer style="text-align:center;padding:32px;color:#8b949e;font-size:0.8rem;border-top:1px solid #21262d;margin-top:48px">
  © 2026 Civil App NZ · <a href="https://nzciflexi.wordpress.com">nzciflexi.wordpress.com</a>
</footer>
</body>
</html>
